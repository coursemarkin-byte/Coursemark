<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings | CourseMark Admin</title>
  <link rel="stylesheet" href="css/admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../js/config.js"></script>
  <style>
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .settings-card { background: var(--white); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
    .settings-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
    .field input, .field select {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px; outline: none; background: var(--bg);
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .save-btn {
      background: var(--accent); color: #fff; border: none;
      padding: 10px 20px; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .save-btn:hover { background: var(--accent-dark); }
    .admin-info { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
    .admin-info img { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
    .admin-info h4 { font-size: 16px; font-weight: 600; }
    .admin-info p { font-size: 13px; color: var(--text-muted); }
  </style>
</head>
<body>

<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><h2>CourseMark</h2><span>Admin Panel</span></div>
    <nav>
      <a href="index.html"><span class="icon">📊</span> Overview</a>
      <a href="courses.html"><span class="icon">🎓</span> Courses</a>
      <a href="creators.html"><span class="icon">👨‍🏫</span> Creators</a>
      <a href="students.html"><span class="icon">👩‍🎓</span> Students</a>
      <a href="settings.html" class="active"><span class="icon">⚙️</span> Settings</a>
    </nav>
    <div class="sidebar-footer"><a href="../index.html">← Back to Website</a></div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-search"><span>🔍</span><input type="search" placeholder="Search anything..." /></div>
      <div class="topbar-right">
        <div class="admin-profile">
          <img data-admin-avatar src="../assets/images/default-avatar.png" alt="Admin" onerror="this.src='https://ui-avatars.com/api/?name=Admin&background=f5a623&color=fff'" />
          <span data-admin-name>Administrator</span>
        </div>
        <button class="logout-btn" onclick="logoutAdmin()">Logout</button>
      </div>
    </header>

    <main class="content">
      <div class="page-header">
        <h1>Settings</h1>
        <p>Manage your admin account and platform settings.</p>
      </div>

      <div class="settings-grid">

        <!-- Admin Profile -->
        <div class="settings-card">
          <h3>Your Profile</h3>
          <div class="admin-info">
            <img id="profile-avatar" src="https://ui-avatars.com/api/?name=Admin&background=f5a623&color=fff" alt="Admin">
            <div>
              <h4 id="profile-name">Administrator</h4>
              <p id="profile-email">—</p>
            </div>
          </div>
          <div class="field">
            <label>Full Name</label>
            <input type="text" id="setting-name" placeholder="Your name" />
          </div>
          <button class="save-btn" onclick="saveProfile()">Save Changes</button>
        </div>

        <!-- Platform Info -->
        <div class="settings-card">
          <h3>Platform Info</h3>
          <div class="field">
            <label>Platform Name</label>
            <input type="text" value="CourseMark" readonly />
          </div>
          <div class="field">
            <label>Supabase Project</label>
            <input type="text" value="foxnhxtpvwvqnkwcegje" readonly />
          </div>
          <div class="field">
            <label>Commission Rate</label>
            <input type="text" value="10–15%" readonly />
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const profile = await window.requireAdmin();
  if (!profile) return;

  document.getElementById("profile-name").textContent = profile.full_name || "Administrator";
  document.getElementById("profile-email").textContent = profile.email || "—";
  document.getElementById("setting-name").value = profile.full_name || "";
  if (profile.avatar_url) document.getElementById("profile-avatar").src = profile.avatar_url;
});

async function saveProfile() {
  const name = document.getElementById("setting-name").value.trim();
  if (!name) { showToast("Please enter a name", "error"); return; }

  const { data: { user } } = await window.supabaseClient.auth.getUser();
  const { error } = await window.supabaseClient.from("profiles").update({ full_name: name }).eq("id", user.id);

  if (error) { showToast("Failed to save", "error"); return; }
  document.getElementById("profile-name").textContent = name;
  document.querySelector("[data-admin-name]").textContent = name;
  showToast("Profile updated!", "success");
}
</script>

</body>
</html>
