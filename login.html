<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">
	<!-- Supabase JS (CDN) -->
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
	<script>
		// Supabase config - replace anon key with your project's public anon key
		const SUPABASE_URL = 'https://foxnhxtpvwvqnkwcegje.supabase.co';
		const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZveG5oeHRwdnd2cW5rd2NlZ2plIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMDgxNTUsImV4cCI6MjA5Nzg4NDE1NX0.WrjYZzLhq5z41pFYhfdQ_yJQMxfUrAV-8PgU0ENZPEk';
		const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
	</script>
</head>
<body>

<nav>
<a href="index.html" class="logo">CourseMark</a>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="courses.html">Courses</a></li>
</ul>
<a href="signup.html" class="login-btn">Student Sign Up</a>
</nav>
<div class="auth-wrapper">

<div class="auth-card">

<h2>Welcome Back</h2>

<p class="sub">
Login to continue learning with CourseMark.
</p>

<form id="login-form">

<div class="input-group">
<label for="email">Email Address</label>
<input id="email" name="email" type="email" placeholder="you@example.com" required>
</div>

<div class="input-group">
<label for="password">Password</label>
<input id="password" name="password" type="password" placeholder="Enter your password" required>
</div>

<button type="submit" class="btn-primary">Login</button>

<button id="google-btn" type="button" class="btn-primary google-button">Continue with Google</button>

<div class="auth-links">
	<button id="forgot-password-btn" type="button" class="link-button">Forgot password?</button>
	<span>New student? <a href="signup.html">Create an account</a></span>
</div>

</form>

<p id="login-message" class="status-message" role="status" aria-live="polite"></p>

<script>
	// Attach login handler
	const loginForm = document.getElementById('login-form');
	const loginMsg = document.getElementById('login-message');

	loginForm.addEventListener('submit', async (e) => {
		e.preventDefault();
		loginMsg.style.color = '#c00';
		loginMsg.textContent = '';

		const email = document.getElementById('email').value.trim();
		const password = document.getElementById('password').value;

		if (!email || !password) {
			loginMsg.textContent = 'Please enter email and password.';
			return;
		}

		try {
			const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
			if (error) {
				loginMsg.textContent = error.message || 'Login error';
				return;
			}

			// Successful login
			loginMsg.style.color = '#080';
			loginMsg.textContent = 'Login successful - redirecting...';
			window.location.href = 'student-dashboard.html';
		} catch (err) {
			loginMsg.textContent = err.message || 'Unexpected error';
		}
	});

	// Optional: Google OAuth button (opens Supabase's OAuth flow)
	document.getElementById('google-btn').addEventListener('click', async () => {
		const { error } = await supabaseClient.auth.signInWithOAuth({
			provider: 'google',
			options: { redirectTo: new URL('student-dashboard.html', window.location.href).href }
		});
		if (error) loginMsg.textContent = error.message;
	});

	document.getElementById('forgot-password-btn').addEventListener('click', async () => {
		const email = document.getElementById('email').value.trim();
		loginMsg.style.color = '#c00';

		if (!email) {
			loginMsg.textContent = 'Enter your email address first.';
			document.getElementById('email').focus();
			return;
		}

		const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
			redirectTo: new URL('login.html', window.location.href).href
		});

		if (error) {
			loginMsg.textContent = error.message;
			return;
		}

		loginMsg.style.color = '#15803d';
		loginMsg.textContent = 'Password reset instructions were sent to your email.';
	});
</script>

</div>

</div>

</div>

</body>
</html>
