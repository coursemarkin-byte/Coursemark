<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | CourseMark</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
<a href="index.html" class="logo">CourseMark</a>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="courses.html">Courses</a></li>
</ul>
<a href="signup.html" class="login-btn"> Sign Up</a>
</nav>
<div class="auth-wrapper">

<div class="auth-card">

<h2>Welcome Back</h2>

<p class="sub">
Login to continue learning with CourseMark.
</p>

<form id="login-form">

<div class="input-group">
<label for="email">Email Address</label>
<input id="email" name="email" type="email" placeholder="you@example.com" required>
</div>

<div class="input-group">
<label for="password">Password</label>
<input id="password" name="password" type="password" placeholder="Enter your password" required>
</div>

<button type="submit" class="btn-primary">Login</button>

<button id="google-btn" type="button" class="btn-primary google-button">Continue with Google</button>

<div class="auth-links">
	<button id="forgot-password-btn" type="button" class="link-button">Forgot password?</button>
	<span>New student? <a href="signup.html">Create an account</a></span>
</div>

</form>

<p id="login-message" class="status-message" role="status" aria-live="polite"></p>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/login.js"></script>
</body>
</html>
