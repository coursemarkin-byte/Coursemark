<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | CourseMark</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
<a href="index.html" class="logo">CourseMark</a>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="courses.html">Courses</a></li>
<li><a href="become-instructor.html">Become Instructor</a></li>
</ul>
</nav>
<div class="auth-wrapper">

<div class="auth-card">

<h2>Welcome Back 👋</h2>

<p class="sub">
Login to continue learning with CourseMark.
</p>

<form>

<div class="input-group">
<label>Email Address</label>
<input type="email" placeholder="you@example.com" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Enter your password" required>
</div>

<p style="text-align:right;margin-top:10px;">
<a href="#">Forgot Password?</a>
</p>

<button
type="button"
class="btn-primary"
onclick="window.location.href='student-dashboard.html'">
Login
</button>

<div style="margin-top:20px;">

<button class="btn-primary" style="background:#fff;border:1px solid #ddd;">
Continue with Google
</button>

</div>

</form>

<p style="margin-top:20px;text-align:center;">
Don't have an account?
<a href="signup.html">Sign Up</a>
</p>

</div>

</div>

</div>

</body>
</html>
