<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav>
      <a href="index.html" class="logo">CourseMark</a>

      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html">Logout</a></li>
      </ul>
    </nav>

    <section class="dashboard">
      <h1>Admin Dashboard</h1>

      <div class="dashboard-cards">
        <div class="dashboard-card">
          <h2>250</h2>
          <p>Students</p>
        </div>

        <div class="dashboard-card">
          <h2>25</h2>
          <p>Creators</p>
        </div>

        <div class="dashboard-card">
          <h2>75</h2>
          <p>Courses</p>
        </div>

        <div class="dashboard-card">
          <h2>Rs. 1,25,000</h2>
          <p>Revenue</p>
        </div>
      </div>

      <h2>Quick Actions</h2>

      <div class="course-grid">
        <div class="course-card">
          <h3>Manage Students</h3>
          <button>View</button>
        </div>

        <div class="course-card">
          <h3>Manage Creators</h3>
          <button>View</button>
        </div>

        <div class="course-card">
          <h3>Manage Courses</h3>
          <button>View</button>
        </div>
      </div>
    </section>
  </body>
</html>
