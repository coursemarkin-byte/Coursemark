<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard | CourseMark</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <style>
    /* Dashboard Layout */
    .dash-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .dash-header h1 {
      font-size: 24px;
      font-weight: 700;
    }

    .dash-header p {
      color: #718096;
      font-size: 14px;
      margin-top: 4px;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid #e8edf3;
      border-radius: 40px;
      padding: 6px 16px 6px 6px;
    }

    .user-badge img {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
    }

    .user-badge span {
      font-size: 14px;
      font-weight: 600;
    }

    /* Stat Cards */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .stat-icon.blue { background: #ebf8ff; }
    .stat-icon.green { background: #f0fff4; }
    .stat-icon.orange { background: #fff8ee; }

    .stat-info h3 {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-info p {
      font-size: 13px;
      color: #718096;
      margin-top: 4px;
    }

    /* Section */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-header h2 {
      font-size: 18px;
      font-weight: 700;
    }

    .browse-link {
      font-size: 14px;
      color: #f5a623;
      text-decoration: none;
      font-weight: 600;
    }

    .browse-link:hover { text-decoration: underline; }

    /* Course Cards */
    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .course-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .course-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    .course-thumb {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: linear-gradient(135deg, #f5a623, #d4881a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .course-thumb img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .course-body { padding: 16px; }

    .course-category {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #f5a623;
      margin-bottom: 6px;
    }

    .course-body h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .course-creator {
      font-size: 13px;
      color: #718096;
      margin-bottom: 12px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #718096;
      margin-bottom: 6px;
    }

    .progress-bar {
      background: #e8edf3;
      border-radius: 4px;
      height: 6px;
      margin-bottom: 14px;
      overflow: hidden;
    }

    .progress-bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #f5a623, #d4881a);
      border-radius: 4px;
      transition: width 0.4s;
    }

    .continue-btn {
      display: block;
      text-align: center;
      background: #f5a623;
      color: #fff;
      padding: 9px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s;
    }

    .continue-btn:hover { background: #d4881a; }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .empty-state p { color: #718096; font-size: 14px; margin-bottom: 20px; }

    .browse-btn {
      display: inline-block;
      background: #f5a623;
      color: #fff;
      padding: 10px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    .browse-btn:hover { background: #d4881a; }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 768px) {
      .stat-grid { grid-template-columns: 1fr 1fr; }
      .course-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .stat-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">CourseMark</a>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="courses.html">Courses</a></li>
  </ul>
  <button id="logout-btn" type="button" class="login-btn" onclick="handleLogout()">Logout</button>
</nav>

<div class="dash-wrap">

  <!-- Header -->
  <div class="dash-header">
    <div>
      <h1 id="welcome-name">Welcome back 👋</h1>
      <p>Track your learning progress and continue where you left off.</p>
    </div>
    <div class="user-badge">
      <img id="user-avatar" src="https://ui-avatars.com/api/?name=Student&background=f5a623&color=fff" alt="Avatar" />
      <span id="user-name">Student</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-icon blue">🎓</div>
      <div class="stat-info">
        <h3 id="enrolled-count">—</h3>
        <p>Enrolled Courses</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">✅</div>
      <div class="stat-info">
        <h3 id="completed-count">—</h3>
        <p>Completed</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange">🏆</div>
      <div class="stat-info">
        <h3 id="certificate-count">—</h3>
        <p>Certificates</p>
      </div>
    </div>
  </div>

  <!-- My Courses -->
  <div class="section-header">
    <h2>My Courses</h2>
    <a href="courses.html" class="browse-link">Browse more →</a>
  </div>

  <div class="course-grid" id="course-grid">
    <!-- Loaded by JS -->
    <div style="grid-column:1/-1;text-align:center;padding:32px;color:#718096">Loading your courses...</div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const sb = window.supabaseClient;

  // Check session
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    window.location.replace("login.html");
    return;
  }

  // Load profile
  const { data: profile } = await sb
    .from("profiles").select("*").eq("id", user.id).single();

  if (profile) {
    document.getElementById("welcome-name").textContent = `Welcome back, ${profile.full_name?.split(" ")[0] || "there"} 👋`;
    document.getElementById("user-name").textContent = profile.full_name || "Student";
    if (profile.avatar_url) {
      document.getElementById("user-avatar").src = profile.avatar_url;
    } else {
      document.getElementById("user-avatar").src = 
        `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.full_name||"S")}&background=f5a623&color=fff`;
    }
  }

  // Load enrollments
  const { data: enrollments, error } = await sb
    .from("enrollments")
    .select("*, courses(id, title, description, thumbnail_url, category, profiles(full_name))")
    .eq("student_id", user.id)
    .order("enrolled_at", { ascending: false });

  const grid = document.getElementById("course-grid");

  if (error || !enrollments || enrollments.length === 0) {
    // Update stats to 0
    document.getElementById("enrolled-count").textContent = "0";
    document.getElementById("completed-count").textContent = "0";
    document.getElementById("certificate-count").textContent = "0";

    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">📚</div>
        <h3>No courses yet</h3>
        <p>You haven't enrolled in any courses. Browse Kerala's best creators and start learning today.</p>
        <a href="courses.html" class="browse-btn">Browse Courses</a>
      </div>`;
    return;
  }

  // Stats
  const completed = enrollments.filter(e => e.progress >= 100).length;
  const certificates = enrollments.filter(e => e.certificate_issued).length;

  document.getElementById("enrolled-count").textContent = enrollments.length;
  document.getElementById("completed-count").textContent = completed;
  document.getElementById("certificate-count").textContent = certificates;

  // Render courses
  grid.innerHTML = enrollments.map(e => {
    const course = e.courses;
    if (!course) return "";
    const progress = e.progress || 0;

    return `
      <div class="course-card">
        <div class="course-thumb">
          ${course.thumbnail_url
            ? `<img src="${course.thumbnail_url}" alt="${course.title}">`
            : `<div style="width:100%;height:160px;background:linear-gradient(135deg,#f5a623,#d4881a);display:flex;align-items:center;justify-content:center;font-size:40px">🎓</div>`}
        </div>
        <div class="course-body">
          <div class="course-category">${course.category || "Course"}</div>
          <h3>${course.title || "Untitled Course"}</h3>
          <p class="course-creator">by ${course.profiles?.full_name || "CourseMark Creator"}</p>
          <div class="progress-label">
            <span>Progress</span>
            <span>${progress}%</span>
          </div>
          <div class="progress-bar"><span style="width:${progress}%"></span></div>
          <a href="course-details.html?id=${course.id}" class="continue-btn">
            ${progress === 0 ? "Start Course" : progress >= 100 ? "Review Course" : "Continue"}
          </a>
        </div>
      </div>`;
  }).join("");
});

async function handleLogout() {
  await window.supabaseClient.auth.signOut();
  window.location.replace("login.html");
}
</script>

</body>
</html>
