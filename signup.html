<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
<meta name="description" content="Create your CourseMark account and start learning from trusted local creators.">
<meta name="theme-color" content="#0f1724">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | CourseMark</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
    <a href="index.html" class="logo">CourseMark</a>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="courses.html">Courses</a></li>
    </ul>
</nav>

<div class="auth-wrapper">

    <div class="auth-card">

        <h2>Create Your Account </h2>

        <p class="sub">
            Join CourseMark and start learning from trusted local creators.
        </p>

        <form>

            <div class="input-group">
                <label>Full Name</label>
                <input
                    type="text"
                    placeholder="Muhammed Safvan"
                    required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input
                    type="email"
                    placeholder="you@example.com"
                    required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input
                    type="password"
                    placeholder="Create a password"
                    required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input
                    type="password"
                    placeholder="Confirm your password"
                    required>
            </div>
            <button
                type="button"
                class="btn-primary"
                onclick="window.location.href='student-dashboard.html'">

                Create Account

            </button>

        </form>

        <div style="margin-top:20px;text-align:center;">
            <button class="btn-primary" style="background:#fff;border:1px solid #ddd;color:#0f1724;">
                Continue with Google
            </button>
        </div>

        <p style="margin-top:20px;text-align:center;">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

</div>
</body>
</html>
