<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="Create your CourseMark account and start learning from trusted local creators."
    />
    <meta name="theme-color" content="#0f1724" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Registration | CourseMark</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav>
      <a href="index.html" class="logo">CourseMark</a>

      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="courses.html">Courses</a></li>
      </ul>
      <a href="login.html" class="login-btn">Login</a>
    </nav>

    <div class="auth-wrapper">
      <div class="auth-card">
        <h2> Registration</h2>

        <p class="sub">
          Create an account to browse, purchase, and access courses.
        </p>

        <form id="signup-form">
          <div class="input-group">
            <label for="full-name">Full Name</label>
            <input
              id="full-name"
              name="full-name"
              type="text"
              placeholder="Muhammed Safvan"
              autocomplete="name"
              required
            />
          </div>

          <div class="input-group">
            <label for="email">Email Address</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Create a password"
              autocomplete="new-password"
              minlength="6"
              required
            />
          </div>

          <div class="input-group">
            <label for="confirm-password">Confirm Password</label>
            <input
              id="confirm-password"
              name="confirm-password"
              type="password"
              placeholder="Confirm your password"
              autocomplete="new-password"
              minlength="6"
              required
            />
          </div>
          <div class="input-group">
            <label for="role">Account Type</label>

            <select id="role" name="role" required>
              <option value="student">Student</option>
              <option value="creator">Creator</option>
            </select>
          </div>
          <button
            id="signup-btn"
            type="submit"
            class="btn-primary"
            style="display: block; width: 100%; padding: 12px 20px"
          >
            Sign Up
          </button>
        </form>

        <p
          id="signup-message"
          class="status-message"
          role="status"
          aria-live="polite"
        ></p>

        <p class="auth-footer">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/signup.js"></script>
  </body>
</html>
